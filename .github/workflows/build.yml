name: Build

on:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - run: uv sync

      - run: uv run pyinstaller doall.spec

      - uses: actions/upload-artifact@v4
        with:
          name: doall-${{ matrix.os }}
          path: dist/

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
